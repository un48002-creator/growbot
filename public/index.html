<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrowAdvisor — Asesor de cultivo cannabis</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23639922'/><path d='M16 4C16 4 8 9 8 17C8 21.4 11.6 25 16 25C20.4 25 24 21.4 24 17C24 9 16 4 16 4Z' fill='%23EAF3DE' opacity='0.9'/><path d='M16 10V25' stroke='%23EAF3DE' stroke-width='1.8' stroke-linecap='round'/><path d='M16 15L11.5 12' stroke='%23EAF3DE' stroke-width='1.4' stroke-linecap='round'/><path d='M16 19L20.5 16' stroke='%23EAF3DE' stroke-width='1.4' stroke-linecap='round'/></svg>" />
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 2C10 2 4 6 4 12C4 15.3 6.7 18 10 18C13.3 18 16 15.3 16 12C16 6 10 2 10 2Z" fill="#EAF3DE" opacity="0.95"/>
            <path d="M10 7V18" stroke="#EAF3DE" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M10 11L7 9" stroke="#EAF3DE" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M10 14L13 12" stroke="#EAF3DE" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="header-title">GrowAdvisor</div>
          <div class="header-sub">Asesor de cultivo cannabis</div>
        </div>
      </div>
      <div class="status">
        <span class="status-dot"></span>
        <span class="status-label">IA activa</span>
      </div>
    </header>

    <main class="messages" id="messages">
      <div class="msg-row bot">
        <div class="avatar av-bot">IA</div>
        <div class="bubble bot">
          ¡Hola! Soy GrowAdvisor, tu asesor de cultivo. Preguntame lo que necesites: nutrición, deficiencias, plagas, fotoperiodo, riego, o cualquier problema que veas en tus plantas.
        </div>
      </div>
    </main>

    <div class="suggestions" id="suggestions">
      <button class="sug-btn" data-msg="Mis hojas tienen manchas amarillas, ¿qué puede ser?">Manchas amarillas</button>
      <button class="sug-btn" data-msg="¿Cuándo debo cambiar a floración?">Cambio a floración</button>
      <button class="sug-btn" data-msg="¿Cuáles son los valores ideales de pH y EC?">pH y EC ideales</button>
      <button class="sug-btn" data-msg="¿Cómo identificar sobrerriego?">Sobrerriego</button>
      <button class="sug-btn" data-msg="Tengo puntas quemadas en las hojas, ¿qué hago?">Puntas quemadas</button>
      <button class="sug-btn" data-msg="¿Qué técnica de entrenamiento me recomendás para indoor?">Técnicas de entrenado</button>
    </div>

    <div class="input-area">
      <textarea
        id="user-input"
        placeholder="Preguntá sobre tu cultivo..."
        rows="1"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button class="send-btn" id="send-btn" aria-label="Enviar">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M2 9L16 2L9 16L8 10L2 9Z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </div>

  <script src="/js/chat.js"></script>
</body>
</html>
